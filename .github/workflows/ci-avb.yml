name: ci-avb

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qbs liburing-dev libssl-dev catch2 gcc-14 g++-14
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100
          sudo update-alternatives --set g++ /usr/bin/g++-14
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
          sudo update-alternatives --set gcc /usr/bin/gcc-14

      - name: Configure and build debug
        run: |
          cd source
          qbs build -f source.qbs config:debug -j 2 \
            project.enable_openonload:false \
            project.enable_af_xdp:false \
            project.enable_spdk:false \
            project.enable_quic:false

      - name: Run unit tests
        run: |
          cd source
          TEST_BIN="$(find debug -type f -name kmx-aio-test | head -n 1)"
          if [[ -z "$TEST_BIN" ]]; then
            echo "kmx-aio-test binary not found"
            exit 1
          fi
          timeout 90s "$TEST_BIN"

      - name: Flake guard for channel backpressure wait
        run: |
          cd source
          TEST_BIN="$(find debug -type f -name kmx-aio-test | head -n 1)"
          if [[ -z "$TEST_BIN" ]]; then
            echo "kmx-aio-test binary not found"
            exit 1
          fi
          for i in $(seq 1 20); do
            echo "flake-guard run $i"
            timeout 20s "$TEST_BIN" "channel wait_until_can_send unblocks when consumer pops from a full ring"
          done

      - name: AVB sample CLI smoke tests
        run: |
          cd source
          TALKER_BIN="$(find debug -type f -name sample-avb-talker | head -n 1)"
          LISTENER_BIN="$(find debug -type f -name sample-avb-listener | head -n 1)"
          if [[ -z "$TALKER_BIN" || -z "$LISTENER_BIN" ]]; then
            echo "sample-avb binaries not found"
            exit 1
          fi
          "$TALKER_BIN" --help | head -n 15
          "$LISTENER_BIN" --help | head -n 15
          "$TALKER_BIN" --period-us 0 && exit 1 || true
          "$LISTENER_BIN" --sync-timeout-s 0 && exit 1 || true

  artifact-split-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qbs liburing-dev libssl-dev catch2 gcc-14 g++-14 git cmake meson ninja-build \
            python3 python3-jinja2 python3-pyelftools python3-tabulate libaio-dev libnuma-dev uuid-dev libelf-dev
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100
          sudo update-alternatives --set g++ /usr/bin/g++-14
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
          sudo update-alternatives --set gcc /usr/bin/gcc-14

      - name: Bootstrap QUIC dependencies
        run: |
          bash script/feature/quic/install-dependencies.sh

      - name: Bootstrap local open62541 prefix
        run: |
          bash script/feature/opc_ua/install-dependencies.sh

      - name: Bootstrap local SPDK prefix
        run: |
          git clone --depth 1 --branch v24.09 https://github.com/spdk/spdk.git /tmp/spdk
          git -C /tmp/spdk submodule update --init --recursive
          cd /tmp/spdk
          ./configure --prefix="$PWD/install-local" --with-shared --disable-tests --disable-unit-tests --disable-apps --disable-examples \
            --without-fio --without-vhost --without-iscsi-initiator --without-rbd --without-xnvme --without-fc --without-rdma \
            --without-crypto --without-vfio-user --without-virtio --without-nvme-cuse
          make -j"$(nproc)"
          make install

      - name: Enforce sample artifact boundaries
        run: |
          bash script/ci/check-sample-artifact-boundaries.sh

      - name: Build explicit-dependency samples and tests
        run: |
          cd source
          PRODUCTS="sample-tcp-minimal-client,sample-tcp-minimal-server,sample-tcp-echo-client,sample-tcp-echo-server,sample-udp-minimal-client,sample-udp-minimal-server,sample-udp-echo-client,sample-udp-echo-server,sample-quic-echo-client,sample-quic-echo-server,sample-quic-echo-readiness-client,sample-quic-echo-readiness-server,sample-quic-http3-client,sample-quic-http3-server,sample-tls-echo-completion-client,sample-tls-echo-completion-server,sample-tls-echo-readiness-client,sample-tls-echo-readiness-server,sample-tls-h2-alpn-client,sample-tls-h2-alpn-server,sample-tls-h2-alpn-readiness-client,sample-tls-h2-alpn-readiness-server,sample-avb-talker,sample-avb-listener,sample-avb-readiness-talker,sample-avb-readiness-listener,sample-spdk-minimal,sample-spdk-discovery,sample-xdp-packet-filter,sample-v4l2-capture,sample-v4l2-completion-capture,sample-hft-order-router,kmx-aio-test"
          qbs resolve -f source.qbs config:debug \
            project.enable_openonload:false \
            project.enable_af_xdp:true \
            project.enable_spdk:true \
            project.spdk_prefix:"/tmp/spdk/install-local" \
            project.spdk_enable_crypto:false \
            project.enable_quic:true \
            project.enable_avb:true \
            project.enable_opc_ua:true \
            project.opc_ua_vendored:true \
            project.opc_ua_prefix:"$GITHUB_WORKSPACE/build/open62541/install-local" \
            project.enable_cuda:false

          qbs build -f source.qbs config:debug -j 2 \
            --products "$PRODUCTS" \
            project.enable_openonload:false \
            project.enable_af_xdp:true \
            project.enable_spdk:true \
            project.spdk_prefix:"/tmp/spdk/install-local" \
            project.spdk_enable_crypto:false \
            project.enable_quic:true \
            project.enable_avb:true \
            project.enable_opc_ua:true \
            project.opc_ua_vendored:true \
            project.opc_ua_prefix:"$GITHUB_WORKSPACE/build/open62541/install-local" \
            project.enable_cuda:false

  quic-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qbs liburing-dev libssl-dev catch2 gcc-14 g++-14 git cmake
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100
          sudo update-alternatives --set g++ /usr/bin/g++-14
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
          sudo update-alternatives --set gcc /usr/bin/gcc-14

      - name: Bootstrap QUIC dependencies
        run: |
          bash script/feature/quic/install-dependencies.sh

      - name: Configure and build QUIC smoke artifacts
        run: |
          cd source
          PRODUCTS="sample-quic-echo-readiness-server,sample-quic-echo-readiness-client,sample-quic-http3-server,sample-quic-http3-client,kmx-aio-test"
          qbs build -f source.qbs config:debug -j 2 \
            --products "$PRODUCTS" \
            project.enable_openonload:false \
            project.enable_af_xdp:false \
            project.enable_spdk:false \
            project.enable_quic:true

      - name: Generate temporary QUIC TLS certs
        run: |
          openssl req -x509 -newkey rsa:2048 -nodes \
            -keyout /tmp/quic_key.pem \
            -out /tmp/quic_cert.pem \
            -subj "/CN=localhost" \
            -days 1 >/dev/null 2>&1

      - name: Run readiness QUIC smoke test (5s bounded client)
        run: |
          cd source
          TEST_BIN="$(find debug -type f -name kmx-aio-test | head -n 1)"
          if [[ -z "$TEST_BIN" ]]; then
            echo "kmx-aio-test binary not found"
            exit 1
          fi
          timeout 30s "$TEST_BIN" "[quic][readiness][integration][smoke]"

      - name: Run completion QUIC HTTP3 smoke test (5s bounded client)
        run: |
          cd source
          TEST_BIN="$(find debug -type f -name kmx-aio-test | head -n 1)"
          if [[ -z "$TEST_BIN" ]]; then
            echo "kmx-aio-test binary not found"
            exit 1
          fi
          timeout 30s "$TEST_BIN" "[quic][http3][integration][smoke]"

  gpu-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qbs liburing-dev libssl-dev catch2 gcc-14 g++-14
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100
          sudo update-alternatives --set g++ /usr/bin/g++-14
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
          sudo update-alternatives --set gcc /usr/bin/gcc-14

      - name: Detect CUDA-capable runner
        id: cuda_check
        run: |
          if ! command -v nvidia-smi >/dev/null 2>&1; then
            echo "No NVIDIA driver/runtime detected on runner; GPU smoke will be skipped."
            echo "run_gpu=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ ! -f /usr/include/cuda_runtime.h ]] && [[ ! -f /usr/local/cuda/include/cuda_runtime.h ]]; then
            echo "CUDA headers not detected on runner; GPU smoke will be skipped."
            echo "run_gpu=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "run_gpu=true" >> "$GITHUB_OUTPUT"

      - name: Configure and build GPU smoke artifacts
        if: steps.cuda_check.outputs.run_gpu == 'true'
        run: |
          cd source
          qbs resolve -f source.qbs config:debug \
            project.enable_openonload:false \
            project.enable_af_xdp:false \
            project.enable_spdk:false \
            project.enable_quic:false \
            project.enable_cuda:true
          PRODUCTS="kmx-aio-test,sample-gpu-image-processing"
          qbs build -f source.qbs config:debug -j 2 \
            --products "$PRODUCTS" \
            project.enable_openonload:false \
            project.enable_af_xdp:false \
            project.enable_spdk:false \
            project.enable_quic:false \
            project.enable_cuda:true

      - name: Run GPU sample smoke
        if: steps.cuda_check.outputs.run_gpu == 'true'
        run: |
          cd source
          SAMPLE_BIN="$(find debug -type f -name sample-gpu-image-processing | head -n 1)"
          if [[ -z "$SAMPLE_BIN" ]]; then
            echo "sample-gpu-image-processing binary not found"
            exit 1
          fi
          timeout 30s "$SAMPLE_BIN" --max-frames 1 --width 320 --height 240 --buffer-count 2 --gpu-device 0

      - name: Run GPU-tagged tests
        if: steps.cuda_check.outputs.run_gpu == 'true'
        run: |
          cd source
          TEST_BIN="$(find debug -type f -name kmx-aio-test | head -n 1)"
          if [[ -z "$TEST_BIN" ]]; then
            echo "kmx-aio-test binary not found"
            exit 1
          fi
          timeout 60s "$TEST_BIN" "[gpu]"
